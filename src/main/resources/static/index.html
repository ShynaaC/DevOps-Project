<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company Intranet</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header>

        <h1>DASHBOARD</h1>

        <div class="status">
            <span>Status : Operational</span>
            <span id="time"></span>
        </div>

    </header>


    <section class="top">

        <div class="news">

            <div class="title">

                <h2>Latest News</h2>

            </div>

            <div id="newsContainer"></div>

        </div>


        <div class="announcements">

            <h3>Announcements</h3>

            <div id="announcementContainer"></div>

            <button>Mark All As Read</button>

        </div>

    </section>



    <section class="bottom">

        <div class="policies">

            <h2>HR Policies</h2>

            <div id="policyContainer"></div>

        </div>


        <div class="holidays">

            <h2>Holiday Calendar</h2>

            <div id="holidayContainer"></div>

        </div>

    </section>


</div>

<script src="js/script.js"></script>

</body>

</html>
