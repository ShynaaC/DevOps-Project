<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Company Intranet</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<header class="navbar">

    <div class="logo">
        INTRANET
    </div>

    <nav>
        <a href="#">Directory</a>
        <a href="#">Resources</a>
        <a href="#">Policies</a>
    </nav>

    <div class="search-box">
        <input type="text" placeholder="Search system...">
    </div>

    <div class="nav-icons">
        <span>Notifs</span>
        <span>User</span>
    </div>

</header>
<div class="container">

    <header>

        <h1>DASHBOARD</h1>

        <div class="status">
            <span>Status : Operational</span>
            <span id="time"></span>
        </div>

    </header>


    <section class="top">

        <div class="news">

            <div class="title">

                <h2>Latest News</h2>

            </div>

            <div id="newsContainer"></div>

        </div>


        <div class="announcements">

            <h3>Announcements</h3>

            <div id="announcementContainer"></div>

            <button>Mark All As Read</button>

        </div>

    </section>



    <section class="bottom">

        <div class="policies">

            <h2>HR Policies</h2>

            <div id="policyContainer"></div>

        </div>


        <div class="holidays">

            <h2>Holiday Calendar</h2>

            <div id="holidayContainer"></div>

        </div>

    </section>


</div>
<footer class="footer">

    <div class="footer-left">
        © 2026 Company Intranet
    </div>

    <div class="quick-links">

        <button>IT Tickets</button>

        <button>Payroll Portal</button>

        <button>Expense Reports</button>

        <button>Office Booking</button>

    </div>

    <div class="footer-right">

        <a href="#">IT Support</a>

        <a href="#">Privacy Policy</a>

        <span class="status-dot"></span>

        <span>System Status</span>

    </div>

</footer>
<script src="js/script.js"></script>

</body>

</html>
